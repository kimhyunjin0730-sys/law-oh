<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand mark frame, top-left -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="180" height="100" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/>
    <text x="90" y="55" text-anchor="middle"
          font-family="'Playfair Display', 'Times New Roman', serif"
          font-weight="900" font-size="34" letter-spacing="1" fill="#ffffff">BECOME</text>
    <line x1="30" y1="68" x2="150" y2="68" stroke="#ffffff" stroke-width="1.2"/>
    <text x="90" y="86" text-anchor="middle"
          font-family="'Inter', 'Pretendard Variable', sans-serif"
          font-weight="700" font-size="11" letter-spacing="5" fill="#ffffff">LAW FIRM</text>
  </g>

  <!-- BECOME watermark, decorative -->
  <text x="1140" y="600" text-anchor="end"
        font-family="'Playfair Display', serif"
        font-weight="900" font-style="italic"
        font-size="280" letter-spacing="-8"
        fill="#ffffff" fill-opacity="0.05">BECOME</text>

  <!-- Eyebrow -->
  <text x="80" y="290"
        font-family="'Inter', 'JetBrains Mono', monospace"
        font-weight="700" font-size="17" letter-spacing="6"
        fill="#2563EB">LAW FIRM · 律師事務所</text>

  <!-- Headline -->
  <text x="80" y="370"
        font-family="'Noto Serif KR', 'Source Serif 4', serif"
        font-weight="900" font-size="78"
        fill="#ffffff">법률사무소 비컴</text>

  <!-- Tagline -->
  <text x="80" y="440"
        font-family="'Noto Serif KR', 'Source Serif 4', serif"
        font-weight="500" font-size="36"
        fill="#cbd5e1">한국과 중국, 두 언어로 당신의 권리를 지킵니다.</text>

  <!-- Bottom row -->
  <line x1="80" y1="510" x2="220" y2="510" stroke="#2563EB" stroke-width="3"/>
  <text x="80" y="555"
        font-family="'Inter', sans-serif"
        font-weight="700" font-size="20"
        fill="#ffffff">law-oh.kr  ·  대표변호사 오동현</text>
</svg>
