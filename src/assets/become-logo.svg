<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="BECOME Law Firm">
  <!-- transparent canvas — elements only so brightness-0+invert renders a clean white mark on dark heroes -->

  <!-- Outer frame -->
  <rect x="28" y="22" width="264" height="156" rx="2" fill="none" stroke="#0B1220" stroke-width="4"/>

  <!-- BECOME wordmark -->
  <text x="160" y="104"
        text-anchor="middle"
        font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
        font-weight="900"
        font-size="54"
        letter-spacing="2"
        fill="#0B1220">BECOME</text>

  <!-- Divider rule -->
  <line x1="78" y1="124" x2="242" y2="124" stroke="#0B1220" stroke-width="1.6"/>

  <!-- LAW FIRM subtitle -->
  <text x="160" y="154"
        text-anchor="middle"
        font-family="'Inter', 'Pretendard Variable', 'Apple SD Gothic Neo', sans-serif"
        font-weight="700"
        font-size="20"
        letter-spacing="8"
        fill="#0B1220">LAW FIRM</text>
</svg>
