<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" role="img" aria-label="BECOME Law Firm">
  <!-- Top navy bar -->
  <rect x="0" y="0" width="320" height="22" fill="#0B1220"/>

  <!-- White canvas -->
  <rect x="0" y="22" width="320" height="238" fill="#FFFFFF"/>

  <!-- Outer rectangle frame -->
  <rect x="40" y="60" width="240" height="160" fill="none" stroke="#0B1220" stroke-width="4"/>

  <!-- BECOME wordmark -->
  <text x="160" y="152"
        text-anchor="middle"
        font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
        font-weight="900"
        font-size="56"
        letter-spacing="2"
        fill="#0B1220">BECOME</text>

  <!-- Divider rule -->
  <line x1="84" y1="170" x2="236" y2="170" stroke="#0B1220" stroke-width="1.6"/>

  <!-- LAW FIRM subtitle -->
  <text x="160" y="198"
        text-anchor="middle"
        font-family="'Inter', 'Pretendard Variable', 'Apple SD Gothic Neo', sans-serif"
        font-weight="700"
        font-size="20"
        letter-spacing="8"
        fill="#0B1220">LAW FIRM</text>
</svg>
